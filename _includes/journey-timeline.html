<div class="journey-timeline-container">
    <div class="journey-timeline">
        <ul class="journey-segments">
            {% for segment in include.journey.segments %}
            {% if segment.type == "leg" %}
            {% include journey-timeline/_leg.html segment=segment %}
            {% else %}
            {% include journey-timeline/_transfer.html segment=segment %}
            {% endif %}
            {% endfor %}
        </ul>
    </div>
</div>
